name: Robtaxi Digest Pages

on:
  schedule:
    # 每小时采集（北京时间）
    - cron: "10 * * * *"
    # 每日09:00（北京时间）发布与推送（UTC 01:00）
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "手动运行模式：hourly=仅采集，daily=完整发布"
        required: false
        type: choice
        options:
          - daily
          - hourly
        default: daily
      send_notify:
        description: "手动运行是否推送通知（飞书+企微，默认否）"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "robtaxi-digest-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      run_mode: ${{ steps.mode.outputs.run_mode }}
      should_deploy: ${{ steps.mode.outputs.should_deploy }}
      should_notify: ${{ steps.mode.outputs.should_notify }}
      date_bj: ${{ steps.mode.outputs.date_bj }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate sources config
        run: |
          python -m app.validate_sources ./sources.json

      - name: Resolve run mode
        id: mode
        run: |
          EVENT_NAME="${{ github.event_name }}"
          SCHEDULE_EXPR="${{ github.event.schedule }}"
          INPUT_MODE="${{ github.event.inputs.run_mode }}"
          INPUT_NOTIFY="${{ github.event.inputs.send_notify }}"
          DATE_BJ="$(TZ=Asia/Shanghai date +%Y-%m-%d)"

          if [[ "$EVENT_NAME" == "schedule" ]]; then
            if [[ "$SCHEDULE_EXPR" == "0 1 * * *" ]]; then
              RUN_MODE="daily"
            else
              RUN_MODE="hourly"
            fi
          else
            if [[ -n "$INPUT_MODE" ]]; then
              RUN_MODE="$INPUT_MODE"
            else
              RUN_MODE="daily"
            fi
          fi

          SHOULD_DEPLOY="false"
          SHOULD_NOTIFY="false"
          if [[ "$RUN_MODE" == "daily" ]]; then
            SHOULD_DEPLOY="true"
            if [[ "$EVENT_NAME" == "schedule" ]]; then
              SHOULD_NOTIFY="true"
            elif [[ "$EVENT_NAME" == "workflow_dispatch" && "$INPUT_NOTIFY" == "true" ]]; then
              SHOULD_NOTIFY="true"
            fi
          fi

          mkdir -p artifacts
          echo "$DATE_BJ" > artifacts/run_date.txt
          echo "$RUN_MODE" > artifacts/run_mode.txt

          echo "run_mode=$RUN_MODE" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"
          echo "should_notify=$SHOULD_NOTIFY" >> "$GITHUB_OUTPUT"
          echo "date_bj=$DATE_BJ" >> "$GITHUB_OUTPUT"

          echo "[mode] event=$EVENT_NAME schedule=$SCHEDULE_EXPR run_mode=$RUN_MODE deploy=$SHOULD_DEPLOY notify=$SHOULD_NOTIFY date=$DATE_BJ"

      - name: Run pipeline stages
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DATE_BJ="${{ steps.mode.outputs.date_bj }}"
          RUN_MODE="${{ steps.mode.outputs.run_mode }}"

          python -m app.fetch --date "$DATE_BJ" --sources ./sources.json --out ./artifacts/raw --report ./artifacts/reports
          python -m app.parse --date "$DATE_BJ" --in ./artifacts/raw --out ./artifacts/canonical --report ./artifacts/reports
          python -m app.filter_relevance --date "$DATE_BJ" --in ./artifacts/canonical --out ./artifacts/filtered --sources ./sources.json --report ./artifacts/reports
          python -m app.daily_pool --date "$DATE_BJ" --in ./artifacts/filtered --out ./artifacts/daily_pool --report ./artifacts/reports

          if [[ "$RUN_MODE" == "daily" ]]; then
            python -m app.recall_guard --date "$DATE_BJ" --in ./artifacts/daily_pool --sources ./sources.json --report ./artifacts/reports --top-n 20 --min-recall 0.7
            python -m app.summarize --date "$DATE_BJ" --in ./artifacts/daily_pool --out ./artifacts/brief --provider deepseek --report ./artifacts/reports
            python -m app.render --date "$DATE_BJ" --in ./artifacts/brief --out ./site/index.html --report ./artifacts/reports --sources ./sources.json
          else
            echo "[hourly] skip summarize/render/deploy/notify"
          fi

      - name: Upload pages artifact
        if: ${{ steps.mode.outputs.should_deploy == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: robtaxi-run-artifacts
          path: |
            artifacts/brief
            artifacts/daily_pool
            artifacts/filtered
            artifacts/reports
            artifacts/run_date.txt
            artifacts/run_mode.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.should_deploy == 'true' && needs.build.result == 'success' }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: ${{ needs.build.result == 'success' && needs.build.outputs.should_notify == 'true' && needs.deploy.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download run artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: robtaxi-run-artifacts
          path: .

      - name: Resolve run date
        id: run_date
        run: |
          if [[ -f artifacts/run_date.txt ]]; then
            DATE_BJ="$(cat artifacts/run_date.txt)"
          else
            DATE_BJ="${{ needs.build.outputs.date_bj }}"
          fi
          echo "date_bj=$DATE_BJ" >> "$GITHUB_OUTPUT"

      - name: Restore notify daily lock
        id: feishu_notify_lock
        uses: actions/cache/restore@v4
        with:
          path: .notify-lock/${{ steps.run_date.outputs.date_bj }}.feishu.sent
          key: robtaxi-feishu-notify-${{ steps.run_date.outputs.date_bj }}

      - name: Push digest to Feishu
        if: ${{ steps.feishu_notify_lock.outputs.cache-hit != 'true' }}
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_OPEN_ID: ${{ secrets.FEISHU_RECEIVE_OPEN_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
        run: |
          DATE_BJ="${{ steps.run_date.outputs.date_bj }}"
          python -m app.notify_feishu --date "$DATE_BJ" --html-url "${{ needs.deploy.outputs.page_url }}" --in ./artifacts/brief --report ./artifacts/reports

      - name: Write Feishu lock marker
        if: ${{ steps.feishu_notify_lock.outputs.cache-hit != 'true' && success() }}
        run: |
          mkdir -p .notify-lock
          echo "${GITHUB_RUN_ID}" > .notify-lock/${{ steps.run_date.outputs.date_bj }}.feishu.sent

      - name: Save Feishu daily lock
        if: ${{ steps.feishu_notify_lock.outputs.cache-hit != 'true' && success() }}
        uses: actions/cache/save@v4
        with:
          path: .notify-lock/${{ steps.run_date.outputs.date_bj }}.feishu.sent
          key: robtaxi-feishu-notify-${{ steps.run_date.outputs.date_bj }}

      - name: Restore WeCom notify daily lock
        id: wecom_notify_lock
        uses: actions/cache/restore@v4
        with:
          path: .notify-lock/${{ steps.run_date.outputs.date_bj }}.wecom.sent
          key: robtaxi-wecom-notify-${{ steps.run_date.outputs.date_bj }}

      - name: Push digest to WeCom
        if: ${{ steps.wecom_notify_lock.outputs.cache-hit != 'true' }}
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          DATE_BJ="${{ steps.run_date.outputs.date_bj }}"
          python -m app.notify_wecom --date "$DATE_BJ" --html-url "${{ needs.deploy.outputs.page_url }}" --in ./artifacts/brief --report ./artifacts/reports

      - name: Write WeCom lock marker
        if: ${{ steps.wecom_notify_lock.outputs.cache-hit != 'true' && success() }}
        run: |
          mkdir -p .notify-lock
          echo "${GITHUB_RUN_ID}" > .notify-lock/${{ steps.run_date.outputs.date_bj }}.wecom.sent

      - name: Save WeCom daily lock
        if: ${{ steps.wecom_notify_lock.outputs.cache-hit != 'true' && success() }}
        uses: actions/cache/save@v4
        with:
          path: .notify-lock/${{ steps.run_date.outputs.date_bj }}.wecom.sent
          key: robtaxi-wecom-notify-${{ steps.run_date.outputs.date_bj }}

  notify_failure:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: ${{ always() && needs.build.outputs.should_notify == 'true' && (needs.build.result != 'success' || needs.deploy.result != 'success') }}
    steps:
      - name: Send failure alert to Feishu
        id: feishu_failure_alert
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_OPEN_ID: ${{ secrets.FEISHU_RECEIVE_OPEN_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          TEXT=$'Robtaxi 简报任务失败告警\n'"build=${BUILD_RESULT} deploy=${DEPLOY_RESULT}"$'\n'"详情: ${RUN_URL}"
          python -m app.notify_feishu --date "${{ needs.build.outputs.date_bj }}" --text "$TEXT" --report ./artifacts/reports

      - name: Send failure alert to WeCom
        id: wecom_failure_alert
        if: ${{ always() }}
        continue-on-error: true
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          TEXT=$'Robtaxi 简报任务失败告警\n'"build=${BUILD_RESULT} deploy=${DEPLOY_RESULT}"$'\n'"详情: ${RUN_URL}"
          python -m app.notify_wecom --date "${{ needs.build.outputs.date_bj }}" --text "$TEXT" --report ./artifacts/reports

      - name: Fail notify_failure when any channel fails
        if: ${{ always() }}
        run: |
          FEISHU_OUTCOME="${{ steps.feishu_failure_alert.outcome }}"
          WECOM_OUTCOME="${{ steps.wecom_failure_alert.outcome }}"
          echo "feishu_failure_alert=${FEISHU_OUTCOME}"
          echo "wecom_failure_alert=${WECOM_OUTCOME}"
          if [[ "${FEISHU_OUTCOME}" == "failure" || "${WECOM_OUTCOME}" == "failure" ]]; then
            exit 1
          fi
